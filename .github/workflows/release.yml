name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary_name: ayayabot.exe
            ldflags: "-H=windowsgui"
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary_name: ayayabot

    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      - name: Go Mod Tidy
        run: |
          go mod tidy -v

      - name: Go Format Check
        run: go fmt ./...

      - name: Build
        run: |
          go build -ldflags="${{ matrix.ldflags }} -X 'github.com/yiweichiu/AyayaBot/updater.CurrentVersion=${{ github.ref_name }}'" -o ${{ matrix.binary_name }} .
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.goos == 'darwin' && '1' || '0' }}

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item ${{ matrix.binary_name }} release/
          Copy-Item config.yaml.example release/config.yaml.example
          Copy-Item README.md release/
          Compress-Archive -Path release/* -DestinationPath ayayabot-${{ matrix.goos }}-${{ matrix.goarch }}.zip

      - name: Package (macOS)
        if: matrix.goos == 'darwin'
        run: |
          mkdir release
          cp ${{ matrix.binary_name }} release/
          cp config.yaml.example release/config.yaml.example
          cp README.md release/
          cd release && tar -czvf ../ayayabot-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz .

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ayayabot-*.zip
            ayayabot-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
